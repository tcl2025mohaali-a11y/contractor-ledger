name = "api-server"
main = "src/index.ts"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "contractor-ledger"

[vars]
# IMPORTANT: You must add these environment variables in the Cloudflare Dashboard!
# CLERK_PUBLISHABLE_KEY = "pk_..."
# CLERK_SECRET_KEY = "sk_..."
# DATABASE_URL = "postgres://..."
# R2_ACCOUNT_ID = "..."
# R2_ACCESS_KEY_ID = "..."
# R2_SECRET_ACCESS_KEY = "..."
