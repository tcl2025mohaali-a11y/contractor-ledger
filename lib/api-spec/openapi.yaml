openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Construction project (site) operations
  - name: transactions
    description: Deposit and expense operations for a project
  - name: dashboard
    description: Cross-project overview operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects with running totals
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project with running totals
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project and all its transactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /projects/{id}/transactions:
    get:
      operationId: listProjectTransactions
      tags: [transactions]
      summary: List transactions (deposits and expenses) for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    post:
      operationId: createProjectTransaction
      tags: [transactions]
      summary: Add a deposit or expense to a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found

  /projects/{id}/transactions/bulk:
    post:
      operationId: createProjectTransactionsBulk
      tags: [transactions]
      summary: Add multiple transactions to a project at once
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
        "400":
          description: Bad Request
        "404":
          description: Not found

  /projects/{id}/members:
    get:
      operationId: listProjectMembers
      tags: [projects]
      summary: List members of a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
        "404":
          description: Not found
    post:
      operationId: inviteProjectMember
      tags: [projects]
      summary: Invite a user to a project by email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMember"
        "400":
          description: Bad request (user not found, already member)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Project not found

  /projects/{id}/members/{userId}:
    delete:
      operationId: removeProjectMember
      tags: [projects]
      summary: Remove a member from a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /transactions/{id}:
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overview totals across all projects
      responses:
        "200":
          description: Overview summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. These can optionally
        be protected with authentication or ACL checks based on the use case.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `application/pdf`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      required:
        - id
        - name
        - clientName
        - location
        - notes
        - totalReceived
        - totalSpent
        - balance
        - createdAt
        - currentUserRole
      properties:
        id:
          type: integer
        name:
          type: string
        clientName:
          type: string
        location:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        totalReceived:
          type: number
          description: Sum of all deposits received for this project
        totalSpent:
          type: number
          description: Sum of all expenses recorded for this project
        balance:
          type: number
          description: totalReceived minus totalSpent (money remaining in hand)
        createdAt:
          type: string
          format: date-time
        currentUserRole:
          type: string
          enum: [owner, editor, viewer]
          description: Role of the currently authenticated user in this project

    ProjectInput:
      type: object
      required:
        - name
        - clientName
      properties:
        name:
          type: string
          minLength: 1
        clientName:
          type: string
          minLength: 1
        location:
          type: string
        notes:
          type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        clientName:
          type: string
          minLength: 1
        location:
          type: string
        notes:
          type: string

    Transaction:
      type: object
      required:
        - id
        - projectId
        - type
        - amount
        - description
        - date
        - createdAt
      properties:
        id:
          type: integer
        projectId:
          type: integer
        type:
          type: string
          enum: [deposit, expense]
        amount:
          type: number
        description:
          type: string
        date:
          type: string
          format: date
        receiptPath:
          type: string
          nullable: true
          description: Object storage path to the uploaded receipt/invoice PDF or image, if any.
        shopName:
          type: string
          nullable: true
          description: Name of the shop or supplier
        personName:
          type: string
          nullable: true
          description: Name of the person giving or receiving the money
        paymentMethod:
          type: string
          enum: [cash, transfer, card, check]
          nullable: true
          default: cash
        deductionType:
          type: string
          enum: [percentage, amount]
          nullable: true
          default: percentage
        deductionValue:
          type: number
          nullable: true
          description: Value of deduction (e.g. 10.00 or 150)
        deductionReason:
          type: string
          nullable: true
          description: Reason for deduction (e.g. نسبة التوريد)
        transportCost:
          type: number
          nullable: true
        laborCost:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time

    TransactionInput:
      type: object
      required:
        - type
        - amount
        - description
        - date
      properties:
        type:
          type: string
          enum: [deposit, expense]
        amount:
          type: number
          exclusiveMinimum: 0
        description:
          type: string
          minLength: 1
        date:
          type: string
          format: date
        receiptPath:
          type: string
          nullable: true
          description: Object storage path to the uploaded receipt/invoice PDF or image, if any.
        shopName:
          type: string
          nullable: true
        personName:
          type: string
          nullable: true
        paymentMethod:
          type: string
          enum: [cash, transfer, card, check]
          nullable: true
          default: cash
        deductionType:
          type: string
          enum: [percentage, amount]
          nullable: true
          default: percentage
        deductionValue:
          type: number
          nullable: true
        deductionReason:
          type: string
          nullable: true
        transportCost:
          type: number
          nullable: true
        laborCost:
          type: number
          nullable: true

    TransactionUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [deposit, expense]
        amount:
          type: number
          exclusiveMinimum: 0
        description:
          type: string
          minLength: 1
        date:
          type: string
          format: date
        receiptPath:
          type: string
          nullable: true
          description: Object storage path to the uploaded receipt/invoice PDF or image, if any.
        shopName:
          type: string
          nullable: true
        personName:
          type: string
          nullable: true
        paymentMethod:
          type: string
          enum: [cash, transfer, card, check]
          nullable: true
        deductionType:
          type: string
          enum: [percentage, amount]
          nullable: true
        deductionValue:
          type: number
          nullable: true
        deductionReason:
          type: string
          nullable: true
        transportCost:
          type: number
          nullable: true
        laborCost:
          type: number
          nullable: true

    DashboardSummary:
      type: object
      required:
        - projectCount
        - totalReceived
        - totalSpent
        - totalBalance
      properties:
        projectCount:
          type: integer
        totalReceived:
          type: number
        totalSpent:
          type: number
        totalBalance:
          type: number

    ProjectMember:
      type: object
      required:
        - id
        - projectId
        - userId
        - email
        - role
        - createdAt
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [editor, viewer]
        createdAt:
          type: string
          format: date-time

    InviteMemberBody:
      type: object
      required:
        - email
        - role
      properties:
        email:
          type: string
        role:
          type: string
          enum: [editor, viewer]
